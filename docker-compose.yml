# ── Shared backend environment ─────────────────────────────────────────────────
x-backend-env: &backend-env
  DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/transactions_db"
  REDIS_URL: "redis://redis:6379/0"
  CELERY_BROKER_URL: "redis://redis:6379/1"
  CELERY_RESULT_BACKEND: "redis://redis:6379/2"
  OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
  OPENAI_ORG_ID: "${OPENAI_ORG_ID:-}"
  LOG_LEVEL: "${LOG_LEVEL:-INFO}"
  JSON_LOGS: "true"
  DEBUG: "false"

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transactions_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d transactions_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Celery Worker ────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      celery -A app.workers.celery_app.celery_app worker
      --loglevel=info
      --concurrency=2
      --queues=celery

  # ── Flower (Celery monitoring UI) ────────────────────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-env
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - worker
    command: >
      celery -A app.workers.celery_app.celery_app flower
      --port=5555
      --broker=redis://redis:6379/1

  # ── React Frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:8000"
        VITE_WS_URL: "ws://localhost:8000"
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy

  # ── RPA — Wikipedia scraper ──────────────────────────────────────────────────
  # No arranca con `docker compose up` normal.
  # Uso: docker compose --profile rpa run --rm rpa "FastAPI"
  #      make rpa TERM="Python programming language"
  rpa:
    build:
      context: ./rpa
      dockerfile: Dockerfile
    environment:
      API_BASE_URL: "http://api:8000"
      RPA_HEADLESS: "true"
      RPA_SLOW_MO: "0"
      RPA_TIMEOUT_MS: "15000"
      RPA_RETRIES: "3"
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - rpa
    command: ["FastAPI"]

volumes:
  postgres_data:
  redis_data: